<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IDE 远程对话</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 内联兜底样式 */
        body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, sans-serif; margin: 0; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal.hidden { display: none; }
        .modal-content { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; max-width: 400px; width: 90%; }
        .modal-content h3 { font-size: 22px; margin-bottom: 12px; color: #fff; }
        .modal-content p { font-size: 14px; color: #888; margin-bottom: 20px; }
        .modal-content input { width: 100%; padding: 14px; background: #252540; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 16px; }
        .modal-button { width: 100%; padding: 14px; background: linear-gradient(135deg, #6c63ff, #8b5cf6); border: none; border-radius: 10px; color: #fff; font-size: 16px; cursor: pointer; font-weight: 600; }
        .session-item { padding: 16px; background: #1e1e35; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
        .session-item:hover { border-color: #6c63ff; background: #252545; }
        .session-item.active { border-color: #4ade80; background: rgba(74,222,128,0.05); }
        .session-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .session-info { font-size: 12px; color: #888; line-height: 1.4; }
        .session-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .session-badge.online { background: rgba(74,222,128,0.15); color: #4ade80; }
        .session-badge.offline { background: rgba(100,100,100,0.2); color: #888; }
        .session-badge.waiting { background: rgba(250,204,21,0.15); color: #facc15; }
    </style>
    <!-- SVG 图标定义 -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
        <symbol id="icon-zap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </symbol>
        <symbol id="icon-bot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8V4H8"></path><rect width="16" height="12" x="4" y="8" rx="2"></rect>
            <path d="M2 14h2"></path><path d="M20 14h2"></path><path d="M15 13v2"></path><path d="M9 13v2"></path>
        </symbol>
        <symbol id="icon-lightbulb" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"></path>
            <path d="M9 18h6"></path><path d="M10 22h4"></path>
        </symbol>
        <symbol id="icon-smartphone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="14" height="20" x="5" y="2" rx="2" ry="2"></rect><path d="M12 18h.01"></path>
        </symbol>
        <symbol id="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
            <path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
            <path d="M8 16H3v5"></path>
        </symbol>
        <symbol id="icon-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
        </symbol>
        <symbol id="icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"></path><path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
        </symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
        </symbol>
        <symbol id="icon-key" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="7.5" cy="15.5" r="5.5"></circle>
            <path d="m21 2-9.3 9.3"></path><path d="M18.5 5.5 20 7l-1.5 1.5"></path>
        </symbol>
        <symbol id="icon-monitor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="14" x="2" y="3" rx="2"></rect><line x1="8" x2="16" y1="21" y2="21"></line><line x1="12" x2="12" y1="17" y2="21"></line>
        </symbol>
        <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"></path>
        </symbol>
        <symbol id="icon-plug" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22v-5"></path><path d="M9 8V2"></path><path d="M15 8V2"></path>
            <path d="M18 8v5a6 6 0 0 1-6 6 6 6 0 0 1-6-6V8z"></path>
        </symbol>
        <symbol id="icon-check-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><path d="m9 11 3 3L22 4"></path>
        </symbol>
        <symbol id="icon-alert-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line>
        </symbol>
        <symbol id="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
        </symbol>
        <symbol id="icon-message-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22z"></path>
        </symbol>
    </svg>
</head>
<body>
    <div class="app">
        <!-- 头部 -->
        <header class="header">
            <div class="header-content">
                <div class="logo" onclick="window.app && window.app.switchSession()" title="点击切换会话">
                    <span class="logo-icon">
                        <svg class="icon"><use href="#icon-zap"/></svg>
                    </span>
                    <div class="logo-info">
                        <span class="logo-text" id="logoText">IDE Remote</span>
                        <span class="logo-session" id="logoSession"></span>
                    </div>
                </div>
                <div class="status-group">
                    <div class="status-indicator" id="statusIndicator">
                        <span class="status-dot"></span>
                        <span class="status-text">连接中...</span>
                    </div>
                    <div class="ide-status" id="ideStatus">
                        <span class="ide-dot"></span>
                        <span class="ide-text">检查中...</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- 等待通知栏 -->
        <div class="waiting-banner hidden" id="waitingBanner">
            <div class="waiting-banner-content">
                <div class="waiting-banner-icon">
                    <svg class="icon icon-waiting"><use href="#icon-clock"/></svg>
                </div>
                <div class="waiting-banner-text">
                    <div class="waiting-banner-title">AI 正在等待你的指令</div>
                    <div class="waiting-banner-summary" id="waitingSummary"></div>
                </div>
            </div>
        </div>

        <!-- 聊天区域 -->
        <main class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">
                    <svg class="icon icon-welcome"><use href="#icon-bot"/></svg>
                </div>
                <h2>欢迎使用远程对话</h2>
                <p>在下方输入消息，AI 会在电脑端处理并返回结果</p>
                <div class="tips">
                    <div class="tip">
                        <span class="tip-icon"><svg class="icon"><use href="#icon-lightbulb"/></svg></span>
                        <span class="tip-text">IDE 需要在电脑端运行并开启中继连接</span>
                    </div>
                    <div class="tip">
                        <span class="tip-icon"><svg class="icon"><use href="#icon-smartphone"/></svg></span>
                        <span class="tip-text">当状态显示「等待输入」时，可发送指令</span>
                    </div>
                    <div class="tip">
                        <span class="tip-icon"><svg class="icon"><use href="#icon-refresh"/></svg></span>
                        <span class="tip-text">指令将通过中继服务器发送到 IDE</span>
                    </div>
                </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="thinking-indicator" id="thinkingIndicator" style="display: none;">
                <div class="thinking-content">
                    <div class="thinking-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <span class="thinking-text">正在发送指令...</span>
                </div>
            </div>
        </main>

        <!-- 回到底部按钮 -->
        <button class="scroll-bottom-btn hidden" id="scrollBottomBtn" onclick="window.app && window.app.scrollToBottom()">
            <svg class="icon"><use href="#icon-chevron-down"/></svg>
            <span class="scroll-bottom-badge hidden" id="newMsgBadge">新消息</span>
        </button>

        <!-- 输入区域 -->
        <footer class="input-area">
            <div class="input-container">
                <textarea 
                    id="messageInput" 
                    placeholder="输入指令..." 
                    rows="1"
                    maxlength="4000"
                ></textarea>
                <button id="sendButton" class="send-button" disabled>
                    <svg class="icon"><use href="#icon-send"/></svg>
                </button>
            </div>
            <div class="input-footer">
                <span class="char-count" id="charCount">0 / 4000</span>
                <button class="clear-button" id="clearButton">
                    <svg class="icon icon-sm"><use href="#icon-trash"/></svg>
                    清空对话
                </button>
            </div>
        </footer>

        <!-- API Key 弹窗 -->
        <div class="modal" id="apiKeyModal">
            <div class="modal-content">
                <div class="modal-icon">
                    <svg class="icon icon-modal"><use href="#icon-key"/></svg>
                </div>
                <h3>身份验证</h3>
                <p>请输入服务器配置的 API Key 以继续使用</p>
                <input type="password" id="apiKeyInput" placeholder="请输入 API Key">
                <button id="apiKeySubmit" class="modal-button">确认连接</button>
            </div>
        </div>

        <!-- Session 选择弹窗 -->
        <div class="modal hidden" id="sessionModal">
            <div class="modal-content">
                <div class="modal-icon">
                    <svg class="icon icon-modal"><use href="#icon-monitor"/></svg>
                </div>
                <h3>选择 IDE 会话</h3>
                <p>选择要连接的 IDE 会话进行远程对话</p>
                <div id="sessionList" class="session-list">
                    <div class="session-loading">
                        <div class="loading-spinner"></div>
                        <span>正在加载会话列表...</span>
                    </div>
                </div>
                <button id="sessionRefresh" class="modal-button" style="background: rgba(255,255,255,0.08); margin-top: 12px;">
                    <svg class="icon icon-sm" style="vertical-align: -3px; margin-right: 4px;"><use href="#icon-refresh"/></svg>
                    刷新列表
                </button>
            </div>
        </div>

        <!-- Toast 通知 -->
        <div id="toast" class="toast-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
